name: Rebuild Registry

# Weekly rebuild of src/findata/data/registry.sqlite from upstream sources.
# If the new content hash differs from the current commit, a PR is opened
# automatically — keeping a human in the loop instead of pushing to main.
#
# Manual trigger via "Run workflow" button is also supported for ad-hoc
# regeneration (e.g. after a data-quality fix in scripts/build_registry.py).

on:
  schedule:
    # Mondays at 06:00 UTC (~ 03:00 BRT). Most BR gov sources publish
    # on weekday mornings, so by Monday morning we have a fresh week.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Only one rebuild PR at a time — if last week's still open, skip.
concurrency:
  group: rebuild-registry
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Capture current registry sha
        id: before
        run: |
          if [ -f src/findata/data/registry.sqlite ]; then
            python - <<'PY' >> "$GITHUB_OUTPUT"
          import asyncio, sys
          sys.path.insert(0, "src")
          from findata.registry import get_meta
          meta = asyncio.run(get_meta())
          print(f"sha={meta.get('content_sha256','')}")
          print(f"built_at={meta.get('built_at','')}")
          PY
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "built_at=" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild registry
        run: |
          python scripts/build_registry.py

      - name: Capture new registry sha
        id: after
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import asyncio, sys
          sys.path.insert(0, "src")
          from findata.registry import get_meta
          meta = asyncio.run(get_meta())
          print(f"sha={meta.get('content_sha256','')}")
          print(f"sources={meta.get('sources_json','')}")
          PY

      - name: Open PR if content changed
        if: steps.before.outputs.sha != steps.after.outputs.sha
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: registry-update/${{ github.run_id }}
          base: main
          delete-branch: true
          title: "chore(registry): weekly rebuild"
          body: |
            Automated weekly rebuild of `src/findata/data/registry.sqlite`.

            **Before**
              - sha256: `${{ steps.before.outputs.sha }}`
              - built_at: ${{ steps.before.outputs.built_at }}

            **After**
              - sha256: `${{ steps.after.outputs.sha }}`
              - sources: `${{ steps.after.outputs.sources }}`

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          labels: registry-update,automated
          add-paths: src/findata/data/registry.sqlite

      - name: Report no-op
        if: steps.before.outputs.sha == steps.after.outputs.sha
        run: |
          echo "Registry content hash unchanged (${{ steps.after.outputs.sha }})."
          echo "No PR opened."
