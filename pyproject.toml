[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "findata-br"
version = "0.1.0"
description = "Open-source Brazilian financial data API, MCP server, and CLI"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Roberto", email = "robertoecf@gmail.com" }]
keywords = ["brazil", "finance", "api", "mcp", "bcb", "cvm", "b3"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
]

dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "httpx>=0.28",
    "pydantic>=2.0",
    "fastapi-mcp>=0.1",
    "typer>=0.15",
    "rich>=13.0",
    "yfinance>=0.2.50",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "ruff>=0.9",
    "mypy>=1.14",
]

[project.scripts]
findata = "findata.cli:app"

[project.urls]
Homepage = "https://github.com/robertoecf/findata-br"
Repository = "https://github.com/robertoecf/findata-br"

[tool.hatch.build.targets.wheel]
packages = ["src/findata"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
